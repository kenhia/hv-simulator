services:
  hvsim:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - hvsim-data:/data
    environment:
      - HVSIM_DB=sqlite:////data/hvsim.db
      # Uncomment to enable the dev-only PUT /clock controls (rate / time jump):
      # - HVSIM_DEV_CLOCK=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  hvsim-data:
