services:
  hvsim:
    build: ./engine
    ports:
      # host:container — 4667 ("HONR") on the host avoids 8000 (taken by triton
      # on kai). Bound to 0.0.0.0, so reachable from other LAN machines at
      # http://<host>:4667 (open the host firewall for 4667 if one is enabled).
      - "4667:8000"
    volumes:
      - hvsim-data:/data
    environment:
      - HVSIM_DB=sqlite:////data/hvsim.db
      # Uncomment to enable the dev-only PUT /clock controls (rate / time jump):
      # - HVSIM_DEV_CLOCK=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  hvsim-data:
